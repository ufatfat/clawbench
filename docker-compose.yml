version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: clawbench-postgres
    environment:
      POSTGRES_USER: clawbench
      POSTGRES_PASSWORD: clawbench
      POSTGRES_DB: clawbench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clawbench

  redis:
    image: redis:7-alpine
    container_name: clawbench-redis
    ports:
      - "6379:6379"
    networks:
      - clawbench

volumes:
  postgres_data:

networks:
  clawbench:
    driver: bridge
